<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A modern Task Manager application to organize your tasks efficiently." />
  <title>TaskFlow — Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- ============ PARTICLES BACKGROUND ============ -->
  <div class="particles" id="particles"></div>

  <!-- ============ AUTH SCREEN ============ -->
  <div id="auth-screen" class="screen active">
    <div class="auth-container">
      <div class="logo-section">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect x="4" y="8" width="40" height="32" rx="6" stroke="url(#g1)" stroke-width="3" />
            <path d="M14 20L20 26L34 14" stroke="url(#g2)" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" />
            <line x1="14" y1="34" x2="34" y2="34" stroke="url(#g2)" stroke-width="2" stroke-linecap="round"
              opacity="0.5" />
            <defs>
              <linearGradient id="g1" x1="4" y1="8" x2="44" y2="40">
                <stop stop-color="#6C63FF" />
                <stop offset="1" stop-color="#FF6584" />
              </linearGradient>
              <linearGradient id="g2" x1="14" y1="14" x2="34" y2="34">
                <stop stop-color="#6C63FF" />
                <stop offset="1" stop-color="#FF6584" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="logo-text">Task<span>Flow</span></h1>
        <p class="logo-tagline">Organize your world, one task at a time</p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button class="auth-tab active" id="login-tab" data-tab="login">Sign In</button>
          <button class="auth-tab" id="register-tab" data-tab="register">Sign Up</button>
          <div class="tab-indicator" id="tab-indicator"></div>
        </div>

        <form id="auth-form" autocomplete="off">
          <div class="input-group">
            <label for="auth-username">Username</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <input type="text" id="auth-username" placeholder="Enter your username" required />
            </div>
          </div>
          <div class="input-group">
            <label for="auth-password">Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
              <input type="password" id="auth-password" placeholder="Enter your password" required />
            </div>
          </div>
          <div id="auth-error" class="auth-error"></div>
          <button type="submit" class="btn btn-primary btn-full" id="auth-submit">
            <span id="auth-btn-text">Sign In</span>
            <div class="btn-spinner" id="auth-spinner"></div>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ============ DASHBOARD SCREEN ============ -->
  <div id="dashboard-screen" class="screen">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo-mini">
          <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
            <rect x="4" y="8" width="40" height="32" rx="6" stroke="url(#g3)" stroke-width="3" />
            <path d="M14 20L20 26L34 14" stroke="url(#g4)" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" />
            <defs>
              <linearGradient id="g3" x1="4" y1="8" x2="44" y2="40">
                <stop stop-color="#6C63FF" />
                <stop offset="1" stop-color="#FF6584" />
              </linearGradient>
              <linearGradient id="g4" x1="14" y1="14" x2="34" y2="34">
                <stop stop-color="#6C63FF" />
                <stop offset="1" stop-color="#FF6584" />
              </linearGradient>
            </defs>
          </svg>
          <span>Task<strong>Flow</strong></span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="user-badge" id="user-badge">
          <div class="avatar" id="user-avatar"></div>
          <span id="user-display-name"></span>
        </div>
        <button class="btn btn-ghost" id="logout-btn" title="Sign out">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </header>

    <main class="dashboard">
      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-icon stat-icon-total">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
            </svg>
          </div>
          <div>
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Total Tasks</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-done">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
          </div>
          <div>
            <span class="stat-value" id="stat-done">0</span>
            <span class="stat-label">Completed</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon stat-icon-pending">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" />
            </svg>
          </div>
          <div>
            <span class="stat-value" id="stat-pending">0</span>
            <span class="stat-label">Pending</span>
          </div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <h2>My Tasks</h2>
          <div class="filter-pills">
            <button class="pill active" data-filter="all" id="filter-all">All</button>
            <button class="pill" data-filter="pending" id="filter-pending">Pending</button>
            <button class="pill" data-filter="completed" id="filter-completed">Completed</button>
          </div>
        </div>
        <div class="toolbar-right">
          <div class="search-wrapper">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="search-input" placeholder="Search tasks..." />
          </div>
          <button class="btn btn-primary" id="add-task-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            <span>Add Task</span>
          </button>
        </div>
      </div>

      <!-- Task List -->
      <div id="task-list" class="task-list">
        <!-- Tasks rendered here -->
      </div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state" style="display:none;">
        <div class="empty-illustration">
          <svg width="120" height="120" viewBox="0 0 120 120" fill="none">
            <circle cx="60" cy="60" r="50" stroke="url(#eg1)" stroke-width="2" stroke-dasharray="8 6" opacity="0.4" />
            <rect x="35" y="35" width="50" height="50" rx="10" fill="url(#eg2)" opacity="0.15" />
            <path d="M48 58L55 65L72 50" stroke="url(#eg3)" stroke-width="3.5" stroke-linecap="round"
              stroke-linejoin="round" />
            <defs>
              <linearGradient id="eg1" x1="10" y1="10" x2="110" y2="110">
                <stop stop-color="#6C63FF" />
                <stop offset="1" stop-color="#FF6584" />
              </linearGradient>
              <linearGradient id="eg2" x1="35" y1="35" x2="85" y2="85">
                <stop stop-color="#6C63FF" />
                <stop offset="1" stop-color="#FF6584" />
              </linearGradient>
              <linearGradient id="eg3" x1="48" y1="50" x2="72" y2="65">
                <stop stop-color="#6C63FF" />
                <stop offset="1" stop-color="#FF6584" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h3>No tasks yet</h3>
        <p>Click <strong>"Add Task"</strong> to get started!</p>
      </div>

      <!-- Loading State -->
      <div id="loading-state" class="loading-state" style="display:none;">
        <div class="loader"></div>
        <p>Loading your tasks…</p>
      </div>
    </main>
  </div>

  <!-- ============ TASK MODAL ============ -->
  <div id="task-modal" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New Task</h3>
        <button class="modal-close" id="modal-close-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <form id="task-form">
        <input type="hidden" id="task-edit-id" />
        <div class="input-group">
          <label for="task-title">Title</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            <input type="text" id="task-title" placeholder="What needs to be done?" required />
          </div>
        </div>
        <div class="input-group">
          <label for="task-desc">Description</label>
          <textarea id="task-desc" placeholder="Add details about this task…" rows="3"></textarea>
        </div>
        <div class="modal-row">
          <div class="input-group">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>
          <div class="input-group">
            <label for="task-date">Due Date</label>
            <input type="date" id="task-date" />
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="modal-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modal-save-btn">
            <span id="modal-save-text">Create Task</span>
            <div class="btn-spinner" id="modal-spinner"></div>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ============ TOAST ============ -->
  <div id="toast-container" class="toast-container"></div>

  <script src="app.js"></script>
</body>

</html>
